document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02Fsc-if>\n\n    <!-- ============ DIAGNOSTIC ============ -->\n    <sc-if value=\"{{ isDiagnostic }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"{{ viewWrap }}\">\n      <div style=\"max-width:760px; margin:0 auto;\">\n\n        <sc-if value=\"{{ diagIntro }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-bottom:22px;\">\n            <h1 style=\"{{ h1Style }}\">Diagnostic Pretest<\u002Fh1>\n            <p style=\"{{ subStyle }}\">Find your gaps before you study. 60 questions, no timer — finish for a per-domain breakdown.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px; box-shadow:var(--shadow);\">\n            <p style=\"color:var(--text-2); font-size:15px; line-height:1.65; margin-bottom:10px;\">60 questions drawn from a fresh practice test — material not used anywhere else in this tool. After you finish, anything below 75% is flagged as a priority study area.<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:20px 0;\">\n              <sc-for list=\"{{ diagChips }}\" as=\"ch\" hint-placeholder-count=\"6\">\n                <div style=\"{{ ch.style }}\">{{ ch.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"color:var(--text-3); font-size:13px; margin-bottom:22px;\">No timer · navigate forward only · review every miss with a full rationale at the end.<\u002Fp>\n            <button onclick=\"{{ onStartDiag }}\" style=\"{{ primaryBtn }}\" style-hover=\"{{ primaryHover }}\">Start diagnostic →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ diagQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:20px;\">\n            <div style=\"height:7px; background:var(--surface-3); border-radius:6px; overflow:hidden; margin-bottom:10px;\">\n              <div style=\"{{ diagProgStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; font-size:13px;\">\n              <span style=\"color:var(--text-2); font-weight:500; font-variant-numeric:tabular-nums;\">{{ diagProgLabel }}<\u002Fspan>\n              <span style=\"color:var(--text-3);\">{{ diagProgDomain }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px; box-shadow:var(--shadow); animation:pxPop .28s ease;\">\n            <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:18px; flex-wrap:wrap;\">\n              <span style=\"{{ q.tagStyle }}\">{{ q.domainLabel }}<\u002Fspan>\n              <span style=\"font-size:12.5px; color:var(--text-3); font-weight:500;\">{{ q.num }}<\u002Fspan>\n              <sc-if value=\"{{ q.isMulti }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"font-size:11px; font-weight:700; letter-spacing:.05em; color:var(--d4); background:color-mix(in srgb, var(--d4) 14%, transparent); padding:3px 9px; border-radius:8px;\">SELECT ALL<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-size:17px; line-height:1.6; color:var(--text); margin-bottom:20px; text-wrap:pretty;\">{{ q.text }}<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ q.options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ opt.onClick }}\" style=\"{{ opt.rowStyle }}\" style-hover=\"{{ opt.hover }}\">\n                  <div style=\"{{ opt.keyStyle }}\">{{ opt.key }}<\u002Fdiv>\n                  <div style=\"padding-top:3px;\">{{ opt.text }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:20px; display:flex; justify-content:space-between; align-items:center; gap:12px;\">\n              <button onclick=\"{{ onSubmitDiag }}\" disabled=\"{{ q.cantSubmit }}\" style=\"{{ submitStyle }}\" style-hover=\"{{ primaryHover }}\">{{ diagBtnLabel }}<\u002Fbutton>\n              <span style=\"font-size:12.5px; color:var(--text-3);\">{{ q.selectHint }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ diagResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"animation:pxFadeUp .3s ease;\">\n            <div style=\"margin-bottom:6px; font-family:'Schibsted Grotesk',sans-serif; font-size:24px; font-weight:700; color:var(--text); letter-spacing:-.01em;\">Diagnostic complete<\u002Fdiv>\n            <div style=\"font-size:14px; color:var(--text-2); margin-bottom:24px;\">{{ res.sub }}<\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:24px; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:26px; margin-bottom:22px; box-shadow:var(--shadow); flex-wrap:wrap;\">\n              <div>\n                <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-size:50px; font-weight:800; line-height:1; color:var(--accent); font-variant-numeric:tabular-nums;\">{{ res.pct }}<\u002Fdiv>\n                <div style=\"font-size:13.5px; color:var(--text-2); margin-top:6px;\">Overall · {{ res.fraction }} correct<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1; min-width:220px; color:var(--text-2); font-size:14.5px; line-height:1.6;\">{{ res.msg }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; flex-direction:column; gap:11px; margin-bottom:24px;\">\n              <sc-for list=\"{{ res.rows }}\" as=\"row\" hint-placeholder-count=\"6\">\n                <div style=\"{{ row.wrapStyle }}\">\n                  <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:11px; gap:10px;\">\n                    <div>\n                      <div style=\"font-size:14.5px; font-weight:600; color:{{ row.color }};\">{{ row.name }}<\u002Fdiv>\n                      <div style=\"font-size:12px; color:var(--text-3); margin-top:3px;\">{{ row.detail }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex; align-items:center; gap:10px;\">\n                      <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-size:17px; font-weight:700; color:{{ row.pctColor }}; font-variant-numeric:tabular-nums;\">{{ row.pct }}<\u002Fdiv>\n                      <span style=\"{{ row.tagStyle }}\">{{ row.tag }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"height:8px; background:var(--surface-3); border-radius:5px; overflow:hidden;\">\n                    <div style=\"{{ row.barStyle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ res.hasMissed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px; margin-bottom:24px; box-shadow:var(--shadow);\">\n                <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-size:16px; font-weight:700; color:var(--text); margin-bottom:4px;\">Review missed questions ({{ res.missedCount }})<\u002Fdiv>\n                <div style=\"font-size:13px; color:var(--text-2); margin-bottom:16px;\">Full rationale for every question you got wrong — this is the only place answers are revealed.<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:14px;\">\n                  <sc-for list=\"{{ res.missed }}\" as=\"m\" hint-placeholder-count=\"3\">\n                    <div style=\"padding:16px 18px; background:var(--surface-2); border-radius:12px; border-left:3px solid var(--bad);\">\n                      <div style=\"display:flex; gap:10px; align-items:center; margin-bottom:9px; flex-wrap:wrap;\">\n                        <span style=\"{{ m.tagStyle }}\">{{ m.domainLabel }}<\u002Fspan>\n                        <span style=\"font-size:12px; color:var(--text-3);\">{{ m.num }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-size:14.5px; color:var(--text); line-height:1.6; margin-bottom:10px; text-wrap:pretty;\">{{ m.text }}<\u002Fdiv>\n                      <div style=\"font-size:13px; color:var(--text-2); margin-bottom:9px;\">Your answer: <strong style=\"color:var(--bad)\">{{ m.yourAnswer }}<\u002Fstrong> &nbsp;·&nbsp; Correct answer: <strong style=\"color:var(--good)\">{{ m.correctAnswer }}<\u002Fstrong><\u002Fdiv>\n                      <div style=\"font-size:13.5px; line-height:1.6; color:var(--text-2);\">{{ m.exp }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ res.noMissed }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"text-align:center; padding:22px; color:var(--good); font-size:14.5px; font-weight:600; background:var(--good-soft); border-radius:16px; margin-bottom:24px;\">Perfect run — nothing missed to review.<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px; margin-bottom:24px; box-shadow:var(--shadow);\">\n              <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-size:16px; font-weight:700; color:var(--text); margin-bottom:6px;\">Study priority recommendations<\u002Fdiv>\n              <div style=\"font-size:13px; color:var(--text-2); margin-bottom:16px;\">{{ res.recIntro }}<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                <sc-for list=\"{{ res.recs }}\" as=\"rec\" hint-placeholder-count=\"2\">\n                  <div style=\"{{ rec.style }}\">\n                    <div style=\"font-weight:600; color:{{ rec.color }}; font-size:14px; margin-bottom:3px;\">{{ rec.title }}<\u002Fdiv>\n                    <div style=\"color:var(--text-2); font-size:13.5px; line-height:1.55;\">{{ rec.body }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; gap:12px; flex-wrap:wrap;\">\n              <button onclick=\"{{ onRetakeDiag }}\" style=\"{{ ghostBtn }}\" style-hover=\"{{ ghostHover }}\">Retake diagnostic<\u002Fbutton>\n              <button onclick=\"{{ goReview }}\" style=\"{{ primaryBtn }}\" style-hover=\"{{ primaryHover }}\">Go to Domain Review →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  state = {\n    ready:false, theme:'light', isMobile:false, tab:'flashcards',\n    deckIdx:0, deckCards:[], cardIdx:0, flipped:false,\n    qFilter:0, qPool:[], qIdx:0, qSel:[], qAns:false, qScore:0, qTotal:0,\n    activeDomain:null,\n    diagPhase:'intro', diagIdx:0, diagSel:[], diagAnswers:[],\n  };\n\n  componentDidMount(){\n    const apply = () => {\n      this.data = window.PRAXIS_DATA;\n      const cards = this.data.DECKS[0] ? [...this.data.DECKS[0].cards] : [];\n      this.setState({ ready:true, deckCards:cards });\n      this.resetQuiz();\n    };\n    if (window.PRAXIS_DATA) apply();\n    else window.addEventListener('praxis-data-ready', apply, { once:true });\n    this._onResize = () => {\n      const m = window.innerWidth <= 860;\n      if (m !== this.state.isMobile) this.setState({ isMobile:m });\n    };\n    this._onResize();\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount(){ if(this._onResize) window.removeEventListener('resize', this._onResize); }\n\n  // ---- meta ----\n  DLAB = {1:'I · Strategic',2:'II · Instructional',3:'III · Climate & Cultural',4:'IV · Ethical',5:'V · Organizational',6:'VI · Community',7:'Legal Foundations'};\n  PILL = {0:'All domains',1:'I. Strategic',2:'II. Instructional',3:'III. Climate',4:'IV. Ethical',5:'V. Organizational',6:'VI. Community',7:'Legal'};\n  WEIGHTS = {1:17,2:23,3:18,4:16,5:13,6:13};\n  dVar(id){ return 'var(--d'+id+')'; }\n  dTint(id,p){ return 'color-mix(in srgb, var(--d'+id+') '+p+'%, transparent)'; }\n\n  // ---- flashcards ----\n  loadDeck(i){ this.setState({ deckIdx:i, deckCards:[...this.data.DECKS[i].cards], cardIdx:0, flipped:false }); }\n  flip(){ this.setState(s=>({ flipped:!s.flipped })); }\n  prevCard(){ this.setState(s=> s.cardIdx>0 ? { cardIdx:s.cardIdx-1, flipped:false } : null); }\n  nextCard(){ this.setState(s=> s.cardIdx < s.deckCards.length-1 ? { cardIdx:s.cardIdx+1, flipped:false } : null); }\n  shuffleDeck(){ const c=[...this.state.deckCards]; for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];} this.setState({ deckCards:c, cardIdx:0, flipped:false }); }\n  resetDeck(){ this.setState(s=>({ deckCards:[...this.data.DECKS[s.deckIdx].cards], cardIdx:0, flipped:false })); }\n\n  // ---- quiz ----\n  resetQuiz(){\n    const pool = this.data.QUIZ.filter(q=> this.state.qFilter===0 || q.domain===this.state.qFilter);\n    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}\n    this.setState({ qPool:pool, qIdx:0, qSel:[], qAns:false, qScore:0, qTotal:0 });\n  }\n  setFilter(d){ this.setState({ qFilter:d }, ()=> this.resetQuiz()); }\n  toggleQ(i){\n    if(this.state.qAns) return;\n    this.setState(s=>{\n      const q=s.qPool[s.qIdx];\n      let sel;\n      if(q.multi){ sel = s.qSel.includes(i) ? s.qSel.filter(x=>x!==i) : [...s.qSel,i]; }\n      else { sel = [i]; }\n      return { qSel:sel };\n    });\n  }\n  submitQ(){\n    this.setState(s=>{\n      const q=s.qPool[s.qIdx];\n      const ok = s.qSel.length===q.correct.length && s.qSel.every(i=>q.correct.includes(i));\n      return { qAns:true, qScore:s.qScore+(ok?1:0), qTotal:s.qTotal+1 };\n    });\n  }\n  nextQ(){ this.setState(s=>({ qIdx:s.qIdx+1, qSel:[], qAns:false })); }\n\n  // ---- review ----\n  showDomain(id){ this.setState(s=>({ activeDomain: s.activeDomain===id ? null : id })); }\n\n  // ---- diagnostic ----\n  startDiag(){ this.setState({ diagPhase:'quiz', diagIdx:0, diagSel:[], diagAnswers:[] }); }\n  resetDiag(){ this.setState({ diagPhase:'intro' }); }\n  toggleDiag(i){\n    this.setState(s=>{\n      const q=this.data.DIAGNOSTIC[s.diagIdx];\n      const sel = q.multi ? (s.diagSel.includes(i)? s.diagSel.filter(x=>x!==i):[...s.diagSel,i]) : [i];\n      return { diagSel:sel };\n    });\n  }\n  submitDiag(){\n    // True-test mode: record the answer silently and advance — no reveal until the end.\n    this.setState(s=>{\n      const q=this.data.DIAGNOSTIC[s.diagIdx];\n      const sel=[...s.diagSel].sort(), cor=[...q.correct].sort();\n      const ok = JSON.stringify(sel)===JSON.stringify(cor);\n      const record = { domain:q.domain, num:q.num, text:q.q, opts:q.opts, exp:q.exp, correctIdx:q.correct, selected:[...s.diagSel], correct:ok };\n      const answers=[...s.diagAnswers, record];\n      if(s.diagIdx >= this.data.DIAGNOSTIC.length-1){\n        return { diagAnswers:answers, diagPhase:'results' };\n      }\n      return { diagAnswers:answers, diagIdx:s.diagIdx+1, diagSel:[] };\n    });\n  }\n\n  // ---- option builder (shared) ----\n  buildOptions(q, sel, ans, onToggle){\n    const L=['A','B','C','D','E'];\n    return q.opts.map((text,i)=>{\n      const isSel=sel.includes(i), isCor=q.correct.includes(i);\n      let bd='var(--border)', bg='var(--surface)', kb='var(--surface-3)', kc='var(--text-2)', kbd='var(--border-2)';\n      if(!ans){ if(isSel){ bd='var(--accent)'; bg='var(--accent-soft)'; kb='var(--accent)'; kc='#fff'; kbd='var(--accent)'; } }\n      else { if(isCor){ bd='var(--good)'; bg='var(--good-soft)'; kb='var(--good)'; kc='#fff'; kbd='var(--good)'; }\n             else if(isSel){ bd='var(--bad)'; bg='var(--bad-soft)'; kb='var(--bad)'; kc='#fff'; kbd='var(--bad)'; } }\n      return {\n        key:L[i], text,\n        onClick: ans ? null : (()=>onToggle(i)),\n        rowStyle:{ display:'flex', gap:'14px', alignItems:'flex-start', padding:'14px 16px', borderRadius:'13px', border:'1.5px solid '+bd, background:bg, color:'var(--text)', cursor: ans?'default':'pointer', transition:'border-color .15s ease, background .15s ease', fontSize:'14.5px', lineHeight:1.5 },\n        keyStyle:{ flex:'0 0 27px', width:'27px', height:'27px', borderRadius:'8px', background:kb, border:'1px solid '+kbd, color:kc, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12.5px', fontWeight:600, transition:'all .15s ease' },\n        hover: ans ? {} : { borderColor:'var(--border-2)', background:'var(--surface-2)' },\n      };\n    });\n  }\n\n  navBtn(active){\n    return {\n      display:'flex', alignItems:'center', gap:'11px', padding:'10px 13px', borderRadius:'11px',\n      border:'1px solid '+(active?'var(--border)':'transparent'),\n      background: active?'var(--surface)':'transparent',\n      color: active?'var(--text)':'var(--text-2)',\n      fontWeight: active?600:500, fontSize:'14px', fontFamily:'inherit', cursor:'pointer',\n      width: this.state.isMobile?'auto':'100%', whiteSpace:'nowrap', flex:'0 0 auto',\n      boxShadow: active?'var(--shadow)':'none', transition:'all .15s ease',\n    };\n  }\n\n  renderVals(){\n    const s=this.state, m=s.isMobile, d=this.data;\n    const base = {\n      theme:s.theme, themeIsDark:s.theme==='dark', themeIsLight:s.theme==='light',\n      toggleTheme:()=>this.setState(st=>({ theme: st.theme==='dark'?'light':'dark' })),\n      notReady:!s.ready,\n      isFlashcards: s.ready && s.tab==='flashcards',\n      isQuiz: s.ready && s.tab==='quiz',\n      isReview: s.ready && s.tab==='review',\n      isDiagnostic: s.ready && s.tab==='diagnostic',\n      goFlashcards:()=>this.setState({tab:'flashcards'}),\n      goQuiz:()=>this.setState({tab:'quiz'}),\n      goReview:()=>this.setState({tab:'review'}),\n      goDiagnostic:()=>this.setState({tab:'diagnostic'}),\n      navFlashcards:this.navBtn(s.tab==='flashcards'),\n      navQuiz:this.navBtn(s.tab==='quiz'),\n      navReview:this.navBtn(s.tab==='review'),\n      navDiagnostic:this.navBtn(s.tab==='diagnostic'),\n      navHover:{ color:'var(--text)', background:'var(--surface-2)' },\n      shellStyle:{ display:'flex', flexDirection: m?'column':'row', minHeight:'100vh', background:'var(--bg)', fontFamily:\"'Hanken Grotesk',-apple-system,sans-serif\", color:'var(--text)' },\n      sidebarStyle: m\n        ? { position:'sticky', top:0, zIndex:50, background:'color-mix(in srgb, var(--surface) 88%, transparent)', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', borderBottom:'1px solid var(--border)', padding:'12px 16px', display:'flex', flexDirection:'column', gap:'12px' }\n        : { position:'sticky', top:0, alignSelf:'flex-start', height:'100vh', width:'250px', flex:'0 0 250px', background:'var(--surface)', borderRight:'1px solid var(--border)', padding:'22px 16px', display:'flex', flexDirection:'column', gap:'22px' },\n      brandRowStyle:{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px' },\n      navInnerStyle: m\n        ? { display:'flex', flexDirection:'row', gap:'6px', overflowX:'auto', paddingBottom:'2px', margin:'0 -2px' }\n        : { display:'flex', flexDirection:'column', gap:'4px', marginTop:'4px' },\n      sidebarFootStyle: m ? { display:'none' } : { marginTop:'auto', paddingTop:'16px', borderTop:'1px solid var(--border)' },\n      mainStyle:{ flex:1, minWidth:0, overflowX:'hidden' },\n      viewWrap:{ padding: m?'24px 18px 60px':'40px 40px 70px', animation:'pxFadeUp .3s ease' },\n      h1Style:{ fontFamily:\"'Schibsted Grotesk',sans-serif\", fontSize: m?'25px':'30px', fontWeight:800, letterSpacing:'-.02em', color:'var(--text)', lineHeight:1.1 },\n      subStyle:{ fontSize:'15px', color:'var(--text-2)', marginTop:'8px', lineHeight:1.55, maxWidth:'56ch' },\n      primaryBtn:{ padding:'12px 26px', borderRadius:'12px', background:'var(--accent)', border:'none', color:'#fff', fontSize:'14.5px', fontWeight:600, fontFamily:'inherit', cursor:'pointer', boxShadow:'var(--shadow)', transition:'all .15s ease' },\n      primaryHover:{ background:'var(--accent-2)', transform:'translateY(-1px)' },\n      ghostBtn:{ padding:'10px 18px', borderRadius:'11px', border:'1px solid var(--border)', background:'transparent', color:'var(--text-2)', fontSize:'13.5px', fontWeight:500, fontFamily:'inherit', cursor:'pointer', transition:'all .15s ease' },\n      ghostHover:{ borderColor:'var(--border-2)', color:'var(--text)', background:'var(--surface-2)' },\n      ctrlHover:{ borderColor:'var(--border-2)', background:'var(--surface-2)', color:'var(--text)' },\n      ddLabel:{ fontSize:'12px', fontWeight:700, letterSpacing:'.07em', textTransform:'uppercase', color:'var(--text-3)', marginBottom:'12px' },\n    };\n\n    if(!s.ready) return base;\n\n    // ===== FLASHCARDS =====\n    const deck = d.DECKS[s.deckIdx];\n    const decks = d.DECKS.map((dk,i)=>{\n      const active=i===s.deckIdx;\n      return {\n        name:dk.name, onClick:()=>this.loadDeck(i),\n        style:{ padding:'8px 15px', borderRadius:'22px', fontSize:'13px', fontWeight:500, fontFamily:'inherit', cursor:'pointer', transition:'all .15s ease', whiteSpace:'nowrap',\n          border:'1.5px solid '+(active?'transparent':'var(--border)'),\n          background: active?'var(--accent)':'transparent',\n          color: active?'#fff':'var(--text-2)',\n          boxShadow: active?'var(--shadow)':'none' },\n        hover: active?{}:{ borderColor:'var(--border-2)', color:'var(--text)' },\n      };\n    });\n    const card = s.deckCards[s.cardIdx] || { front:'', back:'' };\n    base.decks=decks;\n    base.card=card;\n    base.deckColor=this.dVar((s.deckIdx % 7)+1);\n    base.fcInnerStyle={ position:'relative', width:'100%', height:'100%', transformStyle:'preserve-3d', transition:'transform .55s cubic-bezier(.2,.75,.2,1)', transform: s.flipped?'rotateY(180deg)':'rotateY(0deg)' };\n    base.progressText=(s.cardIdx+1)+' / '+s.deckCards.length;\n    base.atStart=s.cardIdx===0;\n    base.atEnd=s.cardIdx===s.deckCards.length-1;\n    base.onFlip=()=>this.flip();\n    base.onPrev=()=>this.prevCard();\n    base.onNext=()=>this.nextCard();\n    base.onShuffle=()=>this.shuffleDeck();\n    base.onReset=()=>this.resetDeck();\n    const ctrlBtn=(dis)=>({ padding:'9px 20px', borderRadius:'10px', border:'1px solid var(--border)', background:'var(--surface)', color: dis?'var(--text-3)':'var(--text)', fontSize:'14px', fontWeight:500, fontFamily:'inherit', cursor: dis?'default':'pointer', opacity: dis?.5:1, transition:'all .15s ease' });\n    base.prevStyle=ctrlBtn(base.atStart);\n    base.nextStyle=ctrlBtn(base.atEnd);\n\n    // ===== QUIZ =====\n    base.pills=[0,1,2,3,4,5,6,7].map(dn=>{\n      const active=s.qFilter===dn;\n      const col = dn===0?'var(--accent)':this.dVar(dn);\n      return { label:this.PILL[dn], onClick:()=>this.setFilter(dn),\n        style:{ padding:'7px 14px', borderRadius:'18px', fontSize:'12.5px', fontWeight:500, fontFamily:'inherit', cursor:'pointer', transition:'all .15s ease', whiteSpace:'nowrap',\n          border:'1.5px solid '+(active?'transparent':'var(--border)'),\n          background: active?col:'transparent', color: active?'#fff':'var(--text-2)',\n          boxShadow: active?'var(--shadow)':'none' },\n        hover: active?{}:{ borderColor:'var(--border-2)', color:'var(--text)' } };\n    });\n    base.scoreText=s.qScore+' / '+s.qTotal;\n    base.scorePct=s.qTotal>0 ? Math.round(s.qScore/s.qTotal*100)+'%' : '';\n    base.onResetQuiz=()=>this.resetQuiz();\n    base.onQuizSubmit=()=>this.submitQ();\n    base.onQuizNext=()=>this.nextQ();\n    base.quizEmpty=s.qPool.length===0;\n    base.quizDone=s.qPool.length>0 && s.qIdx>=s.qPool.length;\n    base.quizActive=s.qPool.length>0 && s.qIdx<s.qPool.length;\n    if(base.quizDone){\n      base.doneTitle='All '+s.qPool.length+' questions complete';\n      base.doneSub='Final score: '+s.qScore+' / '+s.qTotal+' ('+Math.round(s.qScore/s.qTotal*100)+'%)';\n    }\n    if(base.quizActive){\n      const q=s.qPool[s.qIdx];\n      const col=this.dVar(q.domain);\n      base.q=this.questionVM(q, s.qSel, s.qAns, col, (q.domain===7?'Legal Foundations':this.DLAB[q.domain]), (s.qIdx+1)+' / '+s.qPool.length, (i)=>this.toggleQ(i), false);\n      base.submitStyle={ ...base.primaryBtn, opacity: s.qSel.length===0?.45:1, cursor: s.qSel.length===0?'default':'pointer' };\n      base.nextQBtn={ padding:'10px 22px', borderRadius:'11px', background:'var(--surface-2)', border:'1px solid var(--border)', color:'var(--text)', fontSize:'14px', fontWeight:600, fontFamily:'inherit', cursor:'pointer', transition:'all .15s ease' };\n    }\n\n    // ===== REVIEW =====\n    base.reviewCards=d.DOMAINS.map(dm=>{\n      const active=s.activeDomain===dm.id;\n      return { roman:dm.abbr+'.', name:dm.name, weight:dm.weight+'%', questions:dm.questions, color:this.dVar(dm.id),\n        onClick:()=>this.showDomain(dm.id),\n        style:{ background:'var(--surface)', border:'1.5px solid '+(active?this.dVar(dm.id):'var(--border)'), borderRadius:'16px', padding:'18px 20px', cursor:'pointer', transition:'all .18s ease', boxShadow: active?'var(--shadow-lg)':'var(--shadow)', transform: active?'translateY(-2px)':'none' },\n        hover:{ borderColor:'var(--border-2)', transform:'translateY(-2px)', boxShadow:'var(--shadow-lg)' },\n        barStyle:{ height:'100%', width:Math.round(dm.weight/23*100)+'%', background:this.dVar(dm.id), borderRadius:'4px' } };\n    });\n    const dd = s.activeDomain ? d.DOMAINS.find(x=>x.id===s.activeDomain) : null;\n    base.hasDetail=!!dd; base.noDetail=!dd;\n    if(dd){\n      base.detail={ color:this.dVar(dd.id), title:dd.abbr+'. '+dd.name,\n        badgeText:dd.weight+'% of exam · ~'+dd.questions+' Qs',\n        badgeStyle:{ fontSize:'12px', padding:'5px 13px', borderRadius:'20px', fontWeight:600, background:this.dTint(dd.id,15), color:this.dVar(dd.id) },\n        subsections:dd.subsections,\n        concepts:dd.key_concepts.map(c=>({ text:c, style:{ fontSize:'14.5px', padding:'12px 15px', background:'var(--surface-2)', borderRadius:'10px', borderLeft:'3px solid '+this.dVar(dd.id), lineHeight:1.58 } })),\n        redFlags:dd.red_flags, tips:dd.test_maker_tips };\n    }\n\n    // ===== DIAGNOSTIC =====\n    base.diagIntro=s.diagPhase==='intro';\n    base.diagQuiz=s.diagPhase==='quiz';\n    base.diagResults=s.diagPhase==='results';\n    base.onStartDiag=()=>this.startDiag();\n    base.onRetakeDiag=()=>this.resetDiag();\n    base.onSubmitDiag=()=>this.submitDiag();\n    const diagCounts={1:10,2:14,3:11,4:10,5:8,6:7};\n    base.diagChips=[1,2,3,4,5,6].map(dn=>({ label:this.PILL[dn].replace(/^[IVX]+\\. /,m=>m)+' · '+diagCounts[dn]+' Qs',\n      style:{ padding:'9px 12px', borderRadius:'10px', fontSize:'12px', fontWeight:600, textAlign:'center', background:this.dTint(dn,14), color:this.dVar(dn) } }));\n    if(base.diagQuiz){\n      const q=d.DIAGNOSTIC[s.diagIdx];\n      const col=this.dVar(q.domain);\n      const vm=this.questionVM(q, s.diagSel, false, col, this.DLAB[q.domain], 'Q'+q.num+' of '+d.DIAGNOSTIC.length, (i)=>this.toggleDiag(i), true);\n      vm.selectHint=q.multi?'Select all correct answers':'Select one answer';\n      base.q=vm;\n      base.diagBtnLabel = s.diagIdx < d.DIAGNOSTIC.length-1 ? 'Next question →' : 'Finish diagnostic →';\n      base.submitStyle={ ...base.primaryBtn, opacity: s.diagSel.length===0?.45:1, cursor: s.diagSel.length===0?'default':'pointer' };\n      base.nextQBtn={ padding:'10px 22px', borderRadius:'11px', background:'var(--surface-2)', border:'1px solid var(--border)', color:'var(--text)', fontSize:'14px', fontWeight:600, fontFamily:'inherit', cursor:'pointer', transition:'all .15s ease' };\n      const pct=Math.round(s.diagIdx/d.DIAGNOSTIC.length*100);\n      base.diagProgStyle={ height:'100%', width:pct+'%', background:'var(--accent)', borderRadius:'6px', transition:'width .3s ease' };\n      base.diagProgLabel='Question '+(s.diagIdx+1)+' of '+d.DIAGNOSTIC.length;\n      base.diagProgDomain=this.DLAB[q.domain];\n    }\n    if(base.diagResults){\n      const ans=s.diagAnswers, total=ans.length, corr=ans.filter(a=>a.correct).length;\n      const pct=Math.round(corr/total*100);\n      let msg;\n      if(pct>=85) msg='Strong baseline — solid coverage across most domains. Focus your lowest scores first, then use spaced repetition to hold the rest.';\n      else if(pct>=70) msg='Decent starting point. You have gaps in specific domains — the breakdown below shows exactly where to invest your study time.';\n      else msg='This is exactly what the diagnostic is for. Clear gaps are an asset — you now know where your study hours matter most. Don\\u2019t skip a domain even if its weight is low.';\n      base.res={ pct:pct+'%', fraction:corr+'/'+total, msg,\n        sub: corr+' of '+total+' correct — '+(total-corr)+' missed. Domains below 75% are flagged as priority.' };\n      const dom={};\n      for(let dn=1;dn<=6;dn++){ const a=ans.filter(x=>x.domain===dn); const c=a.filter(x=>x.correct).length; dom[dn]={correct:c,total:a.length,pct:a.length?Math.round(c/a.length*100):0}; }\n      const sorted=Object.entries(dom).sort((a,b)=>a[1].pct-b[1].pct);\n      base.res.rows=sorted.map(([dn,data])=>{\n        const gap=data.pct<75, col=this.dVar(dn);\n        return { name:this.DLAB[dn], color:col, pct:data.pct+'%', pctColor: gap?'var(--bad)':'var(--good)',\n          detail:data.correct+'/'+data.total+' correct · '+this.WEIGHTS[dn]+'% of exam',\n          tag: gap?'PRIORITY':'SOLID',\n          tagStyle:{ fontSize:'10.5px', fontWeight:700, letterSpacing:'.04em', padding:'3px 9px', borderRadius:'9px', background: gap?'var(--bad-soft)':'var(--good-soft)', color: gap?'var(--bad)':'var(--good)' },\n          wrapStyle:{ background:'var(--surface)', border:'1px solid '+(gap?'color-mix(in srgb, var(--bad) 40%, var(--border))':'var(--border)'), borderRadius:'14px', padding:'16px 20px', boxShadow:'var(--shadow)' },\n          barStyle:{ height:'100%', width:data.pct+'%', background: gap?'var(--bad)':col, borderRadius:'5px', transition:'width .6s ease' } };\n      });\n      const gaps=sorted.filter(([dn,data])=>data.pct<75);\n      const solid=sorted.filter(([dn,data])=>data.pct>=75);\n      const tips={1:'Review SMART goals, vision vs. mission vs. goals, needs assessments, and how data drives improvement planning.',2:'Focus on walkthrough rubrics, PLCs, data disaggregation, common assessments, and differentiating PD.',3:'Study PBIS, culturally responsive practice, climate surveys, and closing equity gaps in subgroup data.',4:'Review due process, FERPA, IDEA, hiring (inter-rater reliability), and personnel documentation.',5:'Know budget types (Title I/II, capital outlay, discretionary), procurement, safety plans, and FTE funding.',6:'Study communication equity (home-language access), partnerships, advisory councils, and proactive engagement.'};\n      const recs=[];\n      if(gaps.length===0){\n        base.res.recIntro='Every domain is above 75% — nice work.';\n        recs.push({ title:'Maintain with spaced repetition', body:'Keep daily flashcard reviews on Good Words, Signal Words, and legal foundations. Use a full timed mock to confirm before test day.', color:'var(--good)',\n          style:{ padding:'13px 16px', borderRadius:'12px', borderLeft:'3px solid var(--good)', background:'var(--good-soft)' } });\n      } else {\n        base.res.recIntro='Work domains in order — highest exam weight × biggest gap first.';\n        const pri=gaps.sort((a,b)=> (this.WEIGHTS[b[0]]*(75-b[1].pct)) - (this.WEIGHTS[a[0]]*(75-a[1].pct)));\n        pri.forEach(([dn,data])=>{ const col=this.dVar(dn); recs.push({ title:this.DLAB[dn]+' — '+data.pct+'% ('+(75-data.pct)+' pts below target)', body:tips[dn], color:col,\n          style:{ padding:'13px 16px', borderRadius:'12px', borderLeft:'3px solid '+col, background:this.dTint(dn,8) } }); });\n        if(solid.length){ recs.push({ title:'Solid domains', body:solid.map(([dn])=>this.DLAB[dn]).join(', ')+'. Maintain with daily flashcard reviews — don\\u2019t let them slip while you focus elsewhere.', color:'var(--good)',\n          style:{ padding:'13px 16px', borderRadius:'12px', borderLeft:'3px solid var(--good)', background:'var(--good-soft)' } }); }\n      }\n      base.res.recs=recs;\n\n      const missed=ans.filter(a=>!a.correct);\n      base.res.hasMissed=missed.length>0;\n      base.res.noMissed=missed.length===0;\n      base.res.missedCount=missed.length;\n      base.res.missed=missed.map(a=>{\n        const col=this.dVar(a.domain);\n        const L=(arr)=> arr.length ? arr.map(i=>String.fromCharCode(65+i)).join(', ') : '—';\n        return {\n          domainLabel:this.DLAB[a.domain], num:'Q'+a.num, text:a.text, exp:a.exp,\n          yourAnswer:L(a.selected), correctAnswer:L(a.correctIdx),\n          tagStyle:{ fontSize:'11px', fontWeight:600, padding:'3px 10px', borderRadius:'12px', background:this.dTint(a.domain,14), color:col },\n        };\n      });\n    }\n\n    return base;\n  }\n\n  questionVM(q, sel, ans, col, domainLabel, num, onToggle, isDiag){\n    const correctOk = ans && (sel.length===q.correct.length && sel.every(i=>q.correct.includes(i)));\n    return {\n      domainLabel, num, isMulti:!!q.multi, text:q.q, exp:q.exp,\n      options:this.buildOptions(q, sel, ans, onToggle),\n      tagStyle:{ fontSize:'11.5px', fontWeight:600, padding:'4px 11px', borderRadius:'13px', letterSpacing:'.02em', background:'color-mix(in srgb, '+col+' 14%, transparent)', color:col },\n      notAnswered:!ans, answered:ans, cantSubmit:sel.length===0,\n      resultColor: correctOk?'var(--good)':'var(--bad)',\n      badgeText: correctOk?'✓ Correct':'✗ Incorrect',\n      badgeStyle:{ display:'inline-flex', alignItems:'center', gap:'5px', padding:'4px 11px', borderRadius:'18px', fontSize:'12px', fontWeight:700,\n        background: correctOk?'var(--good-soft)':'var(--bad-soft)', color: correctOk?'var(--good)':'var(--bad)' },\n      correctLabel:'Correct: '+q.correct.map(i=>String.fromCharCode(65+i)).join(', '),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
